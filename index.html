// ═══════════════════════════════════════════════════════════════════════════
// TALLER AUTOMOTRIZ - App v6.0 (Beta Test)
// ═══════════════════════════════════════════════════════════════════════════
(function() {
'use strict';

// ── CONSTANTS & CONFIG ───────────────────────────────────────────────────
const SUPABASE_URL = 'https://xfgtjiluftsdkkiayswf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_P_nemuEi3koMIQz4-LgoYA_7wiA02J-';

const PAGES = {
  dashboard: '📊 Panel en Vivo',
  ordenes: '🔧 Órdenes de Trabajo',
  gestion: '💰 Gestión Interna',
  checklist: '✅ Check List',
  actas: '📄 Actas de Recepción',
  vehiculos: '🚗 Vehículos & Clientes',
  insumos: '📦 Insumos & Inventario'
};

const TBASE = ['Cambio aceite motor', 'Cambio filtro aceite', 'Cambio filtro aire', 'Cambio filtro polen', 'Cambio filtro combustible', 'Revisión frenos', 'Limpieza y regulación frenos', 'Alineación y balanceo', 'Revisión suspensión', 'Revisión tren delantero', 'Scanner vehicular', 'Cambio correa de accesorios', 'Carga de batería', 'Revisión sistema eléctrico', 'Revisión sistema de enfriamiento', 'Regulación freno de mano', 'Revisión neumáticos', 'Relleno líquido lavaparabrisas'];

const CATEGORIAS = ['Lubricantes','Filtros','Frenos','Suspensión','Eléctrico','Refrigeración','Correas y Cadenas','Neumáticos','Limpieza','Herramientas','Otros'];

const ACC = ['Extintor','Triángulo','Gata hidráulica','Llave de ruedas','Botiquín','Neumáticos delanteros','Neumáticos traseros','Neumático de repuesto','Parachoque delantero','Parachoque trasero','Carrocería','Puertas','Cinturones de seguridad','Seguro de ruedas','Air bag','Espejos laterales','Espejo retrovisor','TAG'];

const EG = ['Limpiaparabrisas','Luces altas','Luces bajas','Intermitentes','Luces estacionamiento','Luz freno','Luz patente','Luces tablero','Luz interior','Freno de mano','Aire acondicionado','Calefacción','Bocina','Tapices','Alfombras'];

const DOC = ['Permiso de circulación','Seguro obligatorio','Revisión técnica'];

const CC = { B: '#27ae60', M: '#e74c3c', F: '#f5a623', 'N/A': '#60698a' };

// ── STATE ─────────────────────────────────────────────────────────────────
var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var _sesion = null;
var _token = null;
var _vehAll = [];
var _selT = [];
var _chk = {};
var curPage = 'dashboard';
var _chartInst = null;

// ── KEYBOARD SHORTCUTS ─────────────────────────────────────────────────────
var SHORTCUTS = {
  'Escape': { action: 'closeModal', desc: 'Cerrar modal' },
  'd': { action: 'goDashboard', desc: 'Dashboard' },
  'o': { action: 'goOrdenes', desc: 'Órdenes' },
  'g': { action: 'goGestion', desc: 'Gestión' },
  'c': { action: 'goChecklist', desc: 'Checklist' },
  'a': { action: 'goActas', desc: 'Actas' },
  'v': { action: 'goVehiculos', desc: 'Vehículos' },
  'i': { action: 'goInsumos', desc: 'Insumos' },
  'n': { action: 'newItem', desc: 'Nuevo registro' },
  'f': { action: 'focusSearch', desc: 'Buscar' }
};

// ── GLOBAL ERROR HANDLER ──────────────────────────────────────────────────
window.onerror = function(msg, url, line, col, error) {
  TallerApp.showToast('Error: ' + msg, 'err');
  console.error('Global Error:', { msg, url, line, col, error });
  return false;
};

window.onunhandledrejection = function(event) {
  TallerApp.showToast('Error de conexión', 'err');
  console.error('Unhandled Promise Rejection:', event.reason);
};

// ═════════════════════════════════════════════════════════════════════════
// API & HELPERS
// ═════════════════════════════════════════════════════════════════════════

function apiCall(table, method, data, id, filters) {
  return new Promise(function(resolve, reject) {
    (function() {
      try {
        var url = SUPABASE_URL + '/rest/v1/' + table;
        var options = {
          method: method,
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + (_token || ''),
            'Content-Type': 'application/json',
            'Prefer': method === 'POST' ? 'return=representation' : ''
          }
        };
        
        if (method === 'GET' && filters) {
          var params = new URLSearchParams(filters);
          url += '?' + params.toString();
        }
        
        if (method === 'POST' || method === 'PATCH' || method === 'PUT') {
          options.body = JSON.stringify(data);
        }
        
        if (id && (method === 'PATCH' || method === 'PUT' || method === 'DELETE')) {
          url += '?id=eq.' + id;
        }
        
        fetch(url, options).then(function(res) {
          return res.json();
        }).then(function(json) {
          if (!res.ok) throw new Error(json.message || json.error?.message || 'Error en petición');
          resolve({ data: json, error: null });
        }).catch(function(e) {
          console.error('API Error:', e);
          resolve({ data: null, error: e });
        });
      } catch (e) {
        resolve({ data: null, error: e });
      }
    })();
  });
}

var DB = {
  getAll: function(table, filters) {
    return new Promise(function(resolve) {
      if (!_sesion) { TallerApp.showToast('Sesión expirada', 'err'); resolve([]); return; }
      apiCall(table, 'GET', null, null, filters).then(function(result) {
        if (result.error) { TallerApp.showToast('Error al cargar', 'err'); resolve([]); return; }
        resolve(result.data || []);
      });
    });
  },
  get: function(table, id) {
    return new Promise(function(resolve) {
      if (!_sesion) { TallerApp.showToast('Sesión expirada', 'err'); resolve(null); return; }
      apiCall(table, 'GET', null, id).then(function(result) {
        if (result.error) { TallerApp.showToast('Error al obtener', 'err'); resolve(null); return; }
        resolve(Array.isArray(result.data) ? result.data[0] : result.data);
      });
    });
  },
  add: function(table, data) {
    return new Promise(function(resolve, reject) {
      if (!TallerApp.puedeCrear()) { TallerApp.showToast('No tienes permiso', 'err'); reject(new Error('Permiso denegado')); return; }
      apiCall(table, 'POST', data).then(function(result) {
        if (result.error) { TallerApp.showToast('Error al guardar', 'err'); reject(result.error); return; }
        resolve(Array.isArray(result.data) ? result.data[0] : result.data);
      });
    });
  },
  put: function(table, data) {
    return new Promise(function(resolve, reject) {
      if (!TallerApp.puedeEditar()) { TallerApp.showToast('No tienes permiso', 'err'); reject(new Error('Permiso denegado')); return; }
      apiCall(table, 'PATCH', data, data.id).then(function(result) {
        if (result.error) { TallerApp.showToast('Error al actualizar', 'err'); reject(result.error); return; }
        resolve(Array.isArray(result.data) ? result.data[0] : result.data);
      });
    });
  },
  del: function(table, id) {
    return new Promise(function(resolve, reject) {
      if (!TallerApp.puedeEliminar()) { TallerApp.showToast('No tienes permiso', 'err'); reject(new Error('Permiso denegado')); return; }
      apiCall(table, 'DELETE', null, id).then(function(result) {
        if (result.error) { TallerApp.showToast('Error al eliminar', 'err'); reject(result.error); return; }
        resolve(true);
      });
    });
  }
};

function today() { return new Date().toISOString().split('T')[0]; }

function fd(d) { return d ? new Date(d + 'T12:00:00').toLocaleDateString('es-CL') : '—'; }

function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function validarRut(rut) {
  if (!rut) return false;
  rut = rut.replace(/\./g, '').replace(/-/g, '');
  if (rut.length < 8) return false;
  var cuerpo = rut.slice(0, -1);
  var dv = rut.slice(-1).toUpperCase();
  var suma = 0, multiplo = 2;
  for (var i = cuerpo.length - 1; i >= 0; i--) {
    suma += (cuerpo[i] * multiplo);
    multiplo = multiplo === 7 ? 2 : multiplo + 1;
  }
  var dvCalc = 11 - (suma % 11);
  var dvEsperado = dvCalc === 10 ? 'K' : String(dvCalc);
  return dv === dvEsperado;
}

function formatearRut(rut) {
  if (!rut) return '';
  rut = rut.replace(/\./g, '').replace(/-/g, '');
  if (rut.length < 8) return rut;
  var cuerpo = rut.slice(0, -1);
  var dv = rut.slice(-1);
  return cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, '.') + '-' + dv;
}

function formatearMoneda(valor) {
  return '$' + Number(valor || 0).toLocaleString('es-CL');
}

function kpi(icon, val, lbl, color) {
  return '<div class="card" style="text-align:center;border-top:3px solid ' + color + '">' +
    '<div style="font-size:22px;margin-bottom:4px">' + icon + '</div>' +
    '<div style="font-size:28px;font-weight:900;color:' + color + ';line-height:1">' + val + '</div>' +
    '<div style="font-size:11px;color:#60698a;text-transform:uppercase">' + lbl + '</div>' +
  '</div>';
}

function loadingScreen() {
  return '<div style="display:flex;justify-content:center;padding:60px"><div class="loading spin"></div></div>';
}

var TallerApp = window.TallerApp = {
  puedeEditar: function() { return _sesion && _sesion.rol === 'admin'; },
  puedeCrear: function() { return _sesion && _sesion.rol === 'admin'; },
  puedeEliminar: function() { return _sesion && _sesion.rol === 'admin'; },
  
  showToast: function(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = (type === 'err' ? '❌ ' : '✅ ') + msg;
    t.style.background = type === 'err' ? '#e74c3c' : '#27ae60';
    t.style.display = 'block';
    clearTimeout(t._t); t._t = setTimeout(function() { t.style.display = 'none'; }, 3000);
  },
  
  showAlertBar: function(msg) {
    var bar = document.getElementById('alert-bar');
    document.getElementById('alert-msg').textContent = msg;
    bar.classList.add('show');
  },
  
  closeAlertBar: function() {
    document.getElementById('alert-bar').classList.remove('show');
  },
  
  showConfirm: function(title, msg, onConfirm) {
    var overlay = document.getElementById('confirm-overlay');
    overlay.innerHTML = '<div class="confirm-dialog">' +
      '<div class="confirm-box">' +
        '<div class="confirm-title">' + title + '</div>' +
        '<div class="confirm-msg">' + msg + '</div>' +
        '<div class="confirm-btns">' +
          '<button class="btn bo-m" onclick="TallerApp.closeConfirm()">Cancelar</button>' +
          '<button class="btn" style="background:#e74c3c;color:#fff" onclick="TallerApp.confirmAction()">Confirmar</button>' +
        '</div>' +
      '</div>' +
    '</div>';
    overlay.style.display = 'block';
    overlay._onConfirm = onConfirm;
  },
  
  closeConfirm: function() {
    document.getElementById('confirm-overlay').style.display = 'none';
  },
  
  confirmAction: function() {
    var overlay = document.getElementById('confirm-overlay');
    if (overlay._onConfirm) overlay._onConfirm();
    TallerApp.closeConfirm();
  },
  
  openModal: function(html, wide) {
    TallerApp.closeModal();
    var el = document.createElement('div');
    el.className = 'overlay';
    el.innerHTML = '<div class="mbox ' + (wide ? 'wide' : 'narrow') + '">' + html + '</div>';
    el.addEventListener('click', function(e) { if (e.target === el) TallerApp.closeModal(); });
    document.body.appendChild(el);
    document.body.style.overflow = 'hidden';
    document.addEventListener('keydown', escClose);
  },
  
  closeModal: function() {
    var el = document.querySelector('.overlay');
    if (el) { el.remove(); document.body.style.overflow = ''; }
    document.removeEventListener('keydown', escClose);
  },
  
  go: function(page, action) {
    curPage = page;
    TallerApp.renderNav();
    document.getElementById('main').innerHTML = loadingScreen();
    if (page === 'dashboard') TallerApp.renderDashboard();
    else if (page === 'ordenes') TallerApp.renderOrdenes(action);
    else if (page === 'gestion') TallerApp.renderGestionInterna(action);
    else if (page === 'checklist') TallerApp.renderChecklist(action);
    else if (page === 'actas') TallerApp.renderActas(action);
    else if (page === 'vehiculos') TallerApp.renderVehiculos(action);
    else if (page === 'insumos') TallerApp.renderInsumos(action);
    else if (page === 'admin') TallerApp.renderAdmin(action);
    TallerApp.updBadge();
  },
  
  renderNav: function() {
    var pages = Object.assign({}, PAGES);
    if (TallerApp.puedeEditar()) {
      pages.admin = '⚙️ Administración';
    }
    var html = '';
    Object.keys(pages).forEach(function(id) {
      html += '<button class="nb' + (curPage === id ? ' active' : '') + '" onclick="TallerApp.go(\'' + id + '\')">' +
        '<span>' + pages[id] + '</span>' +
        (id === 'ordenes' ? '<span id="nbadge" class="nbadge" style="display:none">0</span>' : '') +
        '</button>';
    });
    document.getElementById('nav').innerHTML = html;
  },
  
  updBadge: function() {
    DB.getAll('ordenes').then(function(ordenes) {
      var n = ordenes.filter(function(x) { return x.estado !== 'Entregado'; }).length;
      var b = document.getElementById('nbadge');
      if (b) { b.textContent = n; b.style.display = n > 0 ? 'inline' : 'none'; }
    });
  },
  
  checkAlerts: function() {
    Promise.all([DB.getAll('insumos'), DB.getAll('ordenes')]).then(function(r) {
      var insumos = r[0] || [];
      var ordenes = r[1] || [];
      
      var stockBajo = insumos.filter(function(i) { return i.stock <= (i.minimo || 0); }).length;
      var ordenesPendientes = ordenes.filter(function(o) { return o.estado === 'Listo' && !o.notificado; }).length;
      
      var alerts = [];
      if (stockBajo > 0) alerts.push('⚠️ ' + stockBajo + ' insumo(s) con stock bajo');
      if (ordenesPendientes > 0) alerts.push('🔔 ' + ordenesPendientes + ' orden(es) listas para entrega');
      
      if (alerts.length > 0) {
        TallerApp.showAlertBar(alerts.join(' · '));
      }
    });
  },
  
  renderDashboard: function() {
    Promise.all([
      DB.getAll('ordenes'),
      DB.getAll('gestion_interna'),
      DB.getAll('insumos')
    ]).then(function(r) {
      var ordenes = r[0] || [];
      var gestion = r[1] || [];
      var insumos = r[2] || [];
      
      var ventas = gestion.reduce(function(sum, g) { return sum + (Number(g.valor_cobrado) || 0); }, 0);
      var costos = gestion.reduce(function(sum, g) { return sum + (Number(g.costo_total) || 0); }, 0);
      var utilidad = ventas - costos;
      var margen = ventas > 0 ? Math.round((utilidad / ventas) * 100) : 0;
      var activas = ordenes.filter(function(o) { return o.estado !== 'Entregado'; }).length;
      var stockBajo = insumos.filter(function(i) { return i.stock <= (i.minimo || 0); }).length;
      
      var kpis = [
        kpi('💰', formatearMoneda(ventas), 'Ventas Totales', '#27ae60'),
        kpi('📊', formatearMoneda(costos), 'Costos Totales', '#e74c3c'),
        kpi('📈', margen + '%', 'Margen Global', margen >= 40 ? '#27ae60' : margen >= 20 ? '#f5a623' : '#e74c3c'),
        kpi('🔧', activas, 'Órdenes Activas', '#f5a623')
      ].join('');
      
      var alertasStock = '';
      if (stockBajo > 0) {
        var bajo = insumos.filter(function(i) { return i.stock <= (i.minimo || 0); }).slice(0, 5);
        alertasStock = '<div class="card" style="border-left:4px solid #e74c3c;margin-top:16px">' +
          '<div class="st">⚠️ ALERTAS DE STOCK BAJO</div>' +
          bajo.map(function(i) { return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1e2340">' +
            '<span>' + esc(i.nombre) + '</span>' +
            '<span style="color:#e74c3c">Stock: ' + i.stock + ' / Mín: ' + (i.minimo || 0) + '</span>' +
          '</div>'; }).join('') +
          '</div>';
      }
      
      // Gráfico de ventas últimos 6 meses
      var meses = [];
      var datosVentas = [];
      var datosCostos = [];
      for (var m = 5; m >= 0; m--) {
        var d = new Date();
        d.setMonth(d.getMonth() - m);
        var mes = d.toISOString().slice(0, 7);
        meses.push(d.toLocaleDateString('es-CL', { month: 'short' }));
        var gMes = gestion.filter(function(g) { return g.fecha_recepcion && g.fecha_recepcion.startsWith(mes); });
        datosVentas.push(gMes.reduce(function(s, g) { return s + (Number(g.valor_cobrado) || 0); }, 0));
        datosCostos.push(gMes.reduce(function(s, g) { return s + (Number(g.costo_total) || 0); }, 0));
      }
      
      var chartHTML = '<div class="card" style="margin-top:16px">' +
        '<div class="st">📊 EVOLUCIÓN FINANCIERA (6 MESES)</div>' +
        '<div class="chart-container">' +
          '<canvas id="salesChart"></canvas>' +
        '</div>' +
      '</div>';
      
      document.getElementById('main').innerHTML = '<div class="fade">' +
        '<div style="margin-bottom:24px"><div style="font-size:38px;font-weight:900">PANEL <span style="color:#f5a623">EN VIVO</span></div>' +
        '<div style="color:#60698a;margin-top:4px;font-size:14px">' + new Date().toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) + '</div></div>' +
        '<div class="g4" style="margin-bottom:20px">' + kpis + '</div>' +
        '<div class="card"><div class="st">💰 ÚLTIMAS GESTIONES</div>' +
        (gestion.slice(0,5).map(function(g) { 
          return '<div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #1e2340">' +
            '<span><b style="color:#f5a623">' + esc(g.patente) + '</b> ' + esc(g.cliente) + '</span>' +
            '<span style="color:#27ae60">' + formatearMoneda(g.valor_cobrado) + '</span>' +
          '</div>';
        }).join('') || '<p style="color:#60698a">Sin datos</p>') +
        '</div>' + alertasStock + chartHTML + '</div>';
      
      // Render Chart
      setTimeout(function() {
        var ctx = document.getElementById('salesChart');
        if (ctx && window.Chart) {
          if (_chartInst) _chartInst.destroy();
          _chartInst = new window.Chart(ctx, {
            type: 'bar',
            data: {
              labels: meses,
              datasets: [
                { label: 'Ventas', data: datosVentas, backgroundColor: '#27ae60', borderRadius: 4 },
                { label: 'Costos', data: datosCostos, backgroundColor: '#e74c3c', borderRadius: 4 }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { position: 'top', labels: { color: '#dde1f0' } } },
              scales: {
                y: { beginAtZero: true, grid: { color: '#1e2340' }, ticks: { color: '#60698a', callback: function(v) { return '$' + (v/1000) + 'k'; } } },
                x: { grid: { display: false }, ticks: { color: '#60698a' } }
              }
            }
          });
        }
      }, 100);
      
      // Check alerts
      TallerApp.checkAlerts();
    });
  },
  
  // ... more functions to be added
};

function escClose(e) { if (e.key === 'Escape') TallerApp.closeModal(); }

// AUTH & SESSION

function setLoading(btn, loading, text) {
  btn.disabled = loading;
  btn.textContent = loading ? '⏳ Cargando...' : text;
}

window.switchTab = function(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('li-err').style.display = 'none';
  document.getElementById('reg-err').style.display = 'none';
};

window.doLogin = function() {
  var email = (document.getElementById('li-email').value || '').trim();
  var pass = document.getElementById('li-pass').value || '';
  var errEl = document.getElementById('li-err');
  var btn = document.getElementById('btn-login');
  
  if (!email || !pass) {
    errEl.textContent = '❌ Completa todos los campos';
    errEl.style.display = 'block';
    return;
  }
  
  setLoading(btn, true);
  errEl.style.display = 'none';
  
  supabaseClient.auth.signInWithPassword({ email: email, password: pass }).then(function(result) {
    if (result.error) throw result.error;
    return supabaseClient.from('perfiles').select('*').eq('id', result.data.user.id).single();
  }).then(function(perfilResult) {
    if (perfilResult.error) throw new Error('Perfil no encontrado');
    var perfil = perfilResult.data;
    if (perfil.activo === false) throw new Error('Usuario desactivado. Contacta al administrador.');
    
    _sesion = { usuario: perfil.id, nombre: perfil.nombre, rol: perfil.rol, email: perfil.email };
    _token = result.data.session.access_token;
    
    localStorage.setItem('taller_ses', JSON.stringify(_sesion));
    localStorage.setItem('taller_token', _token);
    
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('sidebar').style.display = 'flex';
    document.getElementById('main').style.display = 'block';
    document.getElementById('li-nombre').textContent = '👤 ' + _sesion.nombre;
    document.getElementById('li-rol').textContent = '(' + (_sesion.rol === 'admin' ? 'Administrador' : 'Solo Lectura') + ')';
    
    TallerApp.renderNav();
    TallerApp.go('dashboard');
    TallerApp.showToast('Bienvenido, ' + _sesion.nombre);
  }).catch(function(e) {
    errEl.textContent = '❌ ' + (e.message || 'Error al iniciar sesión');
    errEl.style.display = 'block';
  }).finally(function() {
    setLoading(btn, false, 'Ingresar →');
  });
};

window.doRegister = function() {
  var nombre = (document.getElementById('reg-name').value || '').trim();
  var email = (document.getElementById('reg-email').value || '').trim();
  var pass = document.getElementById('reg-pass').value || '';
  var errEl = document.getElementById('reg-err');
  var btn = document.getElementById('btn-register');
  
  if (!nombre || !email || !pass) {
    errEl.textContent = '❌ Completa todos los campos';
    errEl.style.display = 'block';
    return;
  }
  
  if (pass.length < 6) {
    errEl.textContent = '❌ La contraseña debe tener al menos 6 caracteres';
    errEl.style.display = 'block';
    return;
  }
  
  setLoading(btn, true);
  errEl.style.display = 'none';
  
  supabaseClient.auth.admin.createUser({
    email: email,
    password: pass,
    email_confirm: true,
    user_metadata: { full_name: nombre }
  }).then(function(result) {
    if (result.error) throw result.error;
    switchTab('login');
    document.getElementById('li-email').value = email;
    TallerApp.showToast('✅ Cuenta creada. Ahora puedes iniciar sesión.');
  }).catch(function(e) {
    errEl.textContent = '❌ ' + (e.message || 'Error al crear cuenta');
    errEl.style.display = 'block';
  }).finally(function() {
    setLoading(btn, false, 'Crear Cuenta →');
  });
};

window.doLogout = function() {
  TallerApp.showConfirm('Cerrar Sesión', '¿Estás seguro de que quieres cerrar sesión?', function() {
    supabaseClient.auth.signOut().then(function() {
      _sesion = null;
      _token = null;
      localStorage.removeItem('taller_ses');
      localStorage.removeItem('taller_token');
      document.getElementById('login-overlay').style.display = 'flex';
      document.getElementById('sidebar').style.display = 'none';
      document.getElementById('main').style.display = 'none';
      document.getElementById('main').innerHTML = '';
      document.getElementById('li-email').value = '';
      document.getElementById('li-pass').value = '';
      document.getElementById('li-err').style.display = 'none';
      setTimeout(function() { document.getElementById('li-email').focus(); }, 100);
    });
  });
};

window.toggleTheme = function() {
  var html = document.documentElement;
  if (html.getAttribute('data-theme') === 'light') {
    html.removeAttribute('data-theme');
  } else {
    html.setAttribute('data-theme', 'light');
  }
};

// ═════════════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS HANDLER
// ═════════════════════════════════════════════════════════════════════════

document.addEventListener('keydown', function(e) {
  // Ignore if typing in input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
    return;
  }
  
  var shortcut = SHORTCUTS[e.key.toLowerCase()];
  if (!shortcut) return;
  
  e.preventDefault();
  
  var hint = document.getElementById('shortcut-hint');
  hint.textContent = shortcut.desc;
  hint.style.display = 'block';
  clearTimeout(hint._t);
  hint._t = setTimeout(function() { hint.style.display = 'none'; }, 1000);
  
  if (shortcut.action === 'closeModal') {
    TallerApp.closeModal();
  } else if (shortcut.action === 'goDashboard') {
    TallerApp.go('dashboard');
  } else if (shortcut.action === 'goOrdenes') {
    TallerApp.go('ordenes');
  } else if (shortcut.action === 'goGestion') {
    TallerApp.go('gestion');
  } else if (shortcut.action === 'goChecklist') {
    TallerApp.go('checklist');
  } else if (shortcut.action === 'goActas') {
    TallerApp.go('actas');
  } else if (shortcut.action === 'goVehiculos') {
    TallerApp.go('vehiculos');
  } else if (shortcut.action === 'goInsumos') {
    TallerApp.go('insumos');
  } else if (shortcut.action === 'newItem') {
    if (curPage === 'ordenes') TallerApp.newOrden();
    else if (curPage === 'gestion') TallerApp.nuevaGestion();
    else if (curPage === 'vehiculos') TallerApp.nuevoVehiculo();
    else if (curPage === 'insumos') TallerApp.nuevoInsumo();
    else if (curPage === 'checklist') TallerApp.nuevoChecklist();
    else if (curPage === 'actas') TallerApp.nuevaActa();
  } else if (shortcut.action === 'focusSearch') {
    var searchInput = document.querySelector('#main input[placeholder*="Buscar"]');
    if (searchInput) searchInput.focus();
  }
});
